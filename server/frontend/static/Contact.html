<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="/static/css/styles.css"> <!-- Correct CSS link -->
</head>
<body>
    <!-- Navigation Bar -->
    <nav>
        <ul>
            <li><a href="/home">Home</a></li>
            <li><a href="/about">About Us</a></li>
            <li><a href="/services">Services</a></li>
            <li><a href="/contact" class="active">Contact Us</a></li> <!-- Active on Contact Us -->
        </ul>
    </nav>

    <header>
        <h1>Contact Us</h1>
    </header>

    <section class="contact-info">
        <div class="contact-item">
            <img src="/static/images/contact_icon.jpg" alt="Contact Icon" class="contact-photo">
            <h2>Email</h2>
            <p>Feel free to reach out to us via email: contact@company.com</p>
        </div>
        <div class="contact-item">
            <img src="/static/images/phone_icon.jpg" alt="Phone Icon" class="contact-photo">
            <h2>Phone</h2>
            <p>Call us at: +1-800-123-4567</p>
        </div>
        <div class="contact-item">
            <img src="/static/images/location_icon.jpg" alt="Location Icon" class="contact-photo">
            <h2>Location</h2>
            <p>Our office is located at: 123 Business St, City, Country</p>
        </div>
    </section>
</body>
</html>
